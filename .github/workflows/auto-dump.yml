name: 自动扒取并解密 IPTV 核心源码

on:
  workflow_dispatch: # 允许手动点击触发
  # schedule:
  #   - cron: '0 0 * * *' # 如果需要每天自动跑一次，取消这两行的注释

jobs:
  dump-script:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' 

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 执行全自动扒壳脚本
        run: |
          python fetch_and_decrypt.py

      - name: 上传剥壳后的核心 JS 代码
        uses: actions/upload-artifact@v4
        with:
          name: Hidden-Core-Script
          path: hidden_script.js
          retention-days: 3
