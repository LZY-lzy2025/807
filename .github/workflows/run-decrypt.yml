name: IPTV 直播源自动解密

on:
  workflow_dispatch: # 允许手动触发
  push:
    paths:
      - 'value.txt'  # 当更新 value.txt 时自动运行

jobs:
  decrypt-streams:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 开启 pip 缓存加速运行

      - name: 安装依赖
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 执行解密脚本
        run: |
          if [ ! -f "value.txt" ]; then
            echo "没有找到 value.txt，跳过执行。"
            exit 0
          fi
          python decrypt.py

      - name: 检查结果并输出日志
        run: |
          if [ -f "result.txt" ]; then
            echo "--- 最新解密结果预览 ---"
            cat result.txt
          fi

      - name: 上传解密结果
        uses: actions/upload-artifact@v4
        with:
          name: Decrypted-Streams
          path: result.txt
          retention-days: 3
